name: car_photo_poc
description: "Car Photo POC - Test on‑device AI segmentation for car photos"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.1+3

  # HTTP client (backend API calls)
  http: ^1.2.0

  # Image handling
  image_picker: ^1.0.7
  # Native platform resize (libjpeg-turbo on Android) — replaces pure-Dart image package
  flutter_image_compress: ^2.3.0

  # Gallery save — saver_gallery uses androidRelativePath (MediaStore RELATIVE_PATH)
  # which correctly creates named albums on Android 10+. gal does not expose this field.
  saver_gallery: ^4.1.1
  path_provider: ^2.1.0

  # Permissions
  permission_handler: ^11.2.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


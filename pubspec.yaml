name: car_photo_poc
description: "Car Photo POC - Test on‑device AI segmentation for car photos"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.1+3

  # HTTP client (backend API calls)
  http: ^1.2.0

  # Image handling
  image_picker: ^1.0.7
  image: ^4.1.7

  # Gallery save
  gal: ^2.3.0

  # Permissions
  permission_handler: ^11.2.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

